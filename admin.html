<style>
:root{
  --ink:#0A1A2F; --steel:#16335C; --signal:#1B5FE0; --signal-2:#3D82FF;
  --mist:#EAF1FB; --line:#C9D8EE; --paper:#FFFFFF; --muted:#5C6B82; --soft:#8A99B0;
  --ok:#0E9F6E; --warn:#E8A100; --danger:#E0364F; --amber:#FFF6E9;
  --grid-head:#F5F8FD; --grid-line:#E7EDF6; --grid-hover:#F1F6FE; --grid-sel:#FFF3DF;
  --shadow:0 18px 50px -18px rgba(11,30,60,.35);
  --shadow-sm:0 6px 18px -8px rgba(11,30,60,.30);
  --side-w:236px; --rail-w:60px; --header-h:56px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:"Pretendard","Malgun Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--ink);background:#F3F6FB;font-size:14px;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,select{font:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cbd7ea;border-radius:6px;border:2px solid #F3F6FB}
::-webkit-scrollbar-thumb:hover{background:#aebfda}

/* ===== 헤더 ===== */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:60;background:#fff;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px}
.hdr .brand{display:flex;align-items:center;gap:9px;color:var(--ink)}
.hdr .bi{height:30px;width:auto;flex:none;display:block}
.hdr .wm{font-size:20px;font-weight:900;color:#14213A;letter-spacing:-.6px}
.hdr .wm i{color:#2E6BF0;font-style:normal}
.hdr .sub{font-size:13px;font-weight:700;color:var(--signal);margin-left:2px;align-self:center}
.hdr .sp{margin-left:auto;display:flex;align-items:center;gap:18px}
.hdr .noti{position:relative;color:var(--muted);font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.hdr .noti .b{background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:1px 6px}

/* ===== 사이드바 ===== */
.side{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--side-w);z-index:40;background:#fff;
  border-right:1px solid var(--line);display:flex;flex-direction:column;transition:width .25s cubic-bezier(.22,1,.3,1)}
.side .side-top{padding:10px 10px 6px;display:flex;gap:6px}
.side .side-top button{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;font-size:11.5px;font-weight:700;
  color:var(--muted);padding:7px 6px;border-radius:8px;border:1px solid var(--line)}
.side .side-top button:hover{color:var(--signal);background:var(--mist);border-color:#bcd2f2}
.side .side-top svg{width:15px;height:15px}
.nav{flex:1;overflow-y:auto;padding:4px 8px 12px}
.nav-sec{margin-bottom:1px}
.nav-h{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:9px;
  font-size:13.5px;font-weight:700;color:var(--steel);text-align:left}
.nav-h:hover{background:var(--mist)}
.nav-h.active{background:var(--mist);color:var(--signal)}
.nav-h .ic{width:20px;height:20px;flex:none;color:var(--soft)}
.nav-h.active .ic{color:var(--signal)}
.nav-h .cv{width:16px;height:16px;margin-left:auto;color:var(--soft);transition:transform .25s}
.nav-sec.open .nav-h .cv{transform:rotate(90deg)}
.nav-sub{display:none;padding:2px 0 4px 0}
.nav-sec.open .nav-sub{display:block}
.nav-i{display:block;padding:7px 10px 7px 42px;font-size:13px;font-weight:500;color:var(--muted);border-radius:8px;cursor:pointer}
.nav-i:hover{color:var(--signal);background:#f6f9fe}
.nav-i.active{color:var(--signal);font-weight:800;background:var(--mist)}
.side-foot{border-top:1px solid var(--line);padding:11px 12px;display:flex;align-items:center;gap:10px}
.side-foot .ava{width:34px;height:34px;border-radius:50%;background:var(--mist);color:var(--signal);display:grid;place-items:center;flex:none}
.side-foot .who{line-height:1.25;flex:1;min-width:0}
.side-foot .who b{display:block;font-size:13px;color:var(--ink)}
.side-foot .who span{font-size:11px;color:var(--soft)}
.side-foot .gear{color:var(--soft)}
.side-foot .gear:hover{color:var(--signal)}

/* 접힘(아이콘 레일) */
.app.rail .side{width:var(--rail-w)}
.app.rail .side .side-top{flex-direction:column}
.app.rail .side .side-top button span,
.app.rail .nav-h span:not(.ic),.app.rail .nav-h .cv,.app.rail .nav-sub,
.app.rail .side-foot .who,.app.rail .side-foot .gear{display:none}
.app.rail .nav-h{justify-content:center;padding:11px 0}
.app.rail .side-foot{justify-content:center}
.app.rail .main{margin-left:var(--rail-w)}

/* ===== 메인 ===== */
.main{margin-left:var(--side-w);margin-top:var(--header-h);padding:16px 22px 40px;transition:margin-left .25s cubic-bezier(.22,1,.3,1);min-height:calc(100vh - var(--header-h))}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:2px 2px 14px}
.crumb .home{color:var(--signal)}
.crumb b{color:var(--steel);font-weight:800}
.crumb svg{width:15px;height:15px;color:var(--soft)}
.view{display:none}
.view.show{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* 필터 바 */
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select,.filters .date,.filters .txt{border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:13px;background:#fff;color:var(--ink);height:36px}
.filters .date{color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--muted);border-right:1px solid var(--line)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--signal);color:#fff}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:8px 14px;border-radius:8px;height:36px}
.btn-primary{background:var(--signal);color:#fff}
.btn-primary:hover{background:#1551c4}
.btn-ghost{border:1px solid var(--line);color:var(--steel);background:#fff}
.btn-ghost:hover{border-color:#bcd2f2;background:var(--mist)}
.btn-dl{border:1px solid var(--signal);color:var(--signal);background:#fff}
.btn-dl:hover{background:var(--mist)}
.spacer{margin-left:auto}
.chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:99px;font-size:12px;font-weight:600;color:var(--muted);background:#fff;cursor:pointer}
.chip:hover{border-color:#bcd2f2;color:var(--signal)}
.chip.on{background:var(--steel);color:#fff;border-color:var(--steel)}
.listmeta{font-size:13px;color:var(--muted);margin:2px 2px 10px}
.listmeta b{color:var(--signal);font-weight:800}

/* ===== AG-GRID 스타일 테이블 ===== */
.ag{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)}
.ag-scroll{overflow-x:auto}
.ag table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px}
.ag thead th{background:var(--grid-head);color:var(--steel);font-weight:700;text-align:center;padding:0 12px;height:44px;
  border-bottom:1px solid var(--line);border-right:1px solid var(--grid-line);white-space:nowrap;position:sticky;top:0;z-index:1;user-select:none}
.ag thead th:last-child{border-right:0}
.ag thead th .sortable{display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.ag thead th .sortable svg{width:11px;height:11px;color:var(--soft)}
.ag tbody td{padding:0 12px;height:46px;border-bottom:1px solid var(--grid-line);border-right:1px solid var(--grid-line);color:var(--ink);text-align:center;white-space:nowrap}
.ag tbody td:last-child{border-right:0}
.ag tbody td.l{text-align:left}
.ag tbody tr{cursor:pointer;transition:background .12s}
.ag tbody tr:hover{background:var(--grid-hover)}
.ag tbody tr.sel{background:var(--grid-sel)}
.ag .lk{color:var(--signal);font-weight:700;text-decoration:underline;text-underline-offset:2px}
.ag .lk.zero{color:var(--danger);text-decoration:line-through}
.ag .go{color:var(--soft);font-weight:800}
.ag .sub{color:var(--soft);font-size:11px}
.ag .por{display:block;color:var(--signal);text-decoration:underline;font-size:11px;line-height:1.5;text-align:left}
.muted{color:var(--muted)}.red{color:var(--danger)}.mono{font-variant-numeric:tabular-nums}

/* 상태 pill */
.st{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;white-space:nowrap}
.st .d{width:8px;height:8px;border-radius:50%;flex:none}
.st.green{color:var(--ok)} .st.green .d{background:var(--ok)}
.st.blue{color:var(--signal)} .st.blue .d{background:var(--signal)}
.st.red{color:var(--danger)} .st.red .d{background:var(--danger)}
.st.gray{color:var(--soft)} .st.gray .d{background:var(--soft)}
.st.amber{color:var(--warn)} .st.amber .d{background:var(--warn)}
.tag{display:inline-block;background:var(--mist);color:var(--signal);font-weight:800;font-size:11px;border-radius:5px;padding:2px 7px}

/* 페이징 */
.pager{display:flex;align-items:center;justify-content:center;gap:4px;margin:18px 0 4px}
.pager button{min-width:30px;height:30px;border-radius:7px;font-size:12.5px;font-weight:700;color:var(--muted);border:1px solid transparent}
.pager button:hover{background:var(--mist);color:var(--signal)}
.pager button.on{background:var(--signal);color:#fff}

/* ===== 차수별 아코디언 ===== */
.acc{border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
.acc-h{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer}
.acc-h:hover{background:#fafcff}
.acc-h .no{font-size:13px;font-weight:800;color:var(--muted)}
.acc-h .spec{font-size:13px;color:var(--ink);font-weight:600}
.acc-h .spec .red{color:var(--danger)}
.acc-h .meta{margin-left:auto;display:flex;align-items:center;gap:22px;font-size:12.5px;color:var(--muted)}
.acc-h .meta b{color:var(--steel)}
.acc-h .cv{width:18px;height:18px;color:var(--soft);transition:transform .25s}
.acc.open .acc-h .cv{transform:rotate(180deg)}
.acc-body{display:none;padding:2px 18px 18px}
.acc.open .acc-body{display:block}
.acc-sub-h{font-size:12.5px;font-weight:800;color:var(--steel);margin:14px 2px 8px}
.acc table{width:100%;border-collapse:collapse;font-size:12px}
.acc th{background:var(--grid-head);color:var(--steel);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:center}
.acc td{padding:8px 10px;border-bottom:1px solid var(--grid-line);text-align:center;color:var(--ink)}
.acc td.l,.acc th.l{text-align:left}

/* ===== 공급사별 카드 리스트 ===== */
.cards{display:flex;flex-direction:column;gap:10px}
.scard{border:1px solid var(--line);border-radius:12px;background:#fff;padding:14px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s}
.scard:hover{border-color:#bcd2f2;box-shadow:var(--shadow)}
.scard .row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.scard .chk{width:18px;height:18px;border:2px solid var(--line);border-radius:5px;flex:none;display:grid;place-items:center;color:#fff}
.scard .chk.on{background:var(--signal);border-color:var(--signal)}
.scard .rno{font-size:14px;font-weight:800;color:var(--ink)}
.scard .mini-btn{font-size:11px;font-weight:700;color:var(--signal);border:1px solid #bcd2f2;border-radius:7px;padding:3px 8px;background:var(--mist)}
.scard .dates{margin-left:auto;font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
.scard .grid2{display:grid;grid-template-columns:1.4fr 1fr auto;gap:6px 26px;margin-top:11px;align-items:center}
.scard .f{font-size:12.5px;color:var(--muted)}
.scard .f b{color:var(--ink);font-weight:700}
.selbar{position:sticky;bottom:0;background:linear-gradient(#fff0,#fff 40%);padding:16px 0 4px;display:flex;justify-content:flex-end;gap:10px;margin-top:4px}

/* ===== 사이드 피크 (노션식 분할뷰) ===== */
.peek-scrim{position:fixed;inset:0;z-index:99;pointer-events:none}
.peek{position:fixed;top:var(--header-h);right:0;bottom:0;width:min(920px,60vw);z-index:100;background:var(--paper);
  box-shadow:-1px 0 0 var(--line),-26px 0 64px -32px rgba(11,30,60,.42);
  transform:translateX(100%);transition:transform .42s cubic-bezier(.22,1,.3,1);display:flex;flex-direction:column}
.peek.show{transform:none}
.peek.full{width:min(1320px,calc(100vw - var(--rail-w) - 8px))}
.peek-grip{position:absolute;top:0;left:0;bottom:0;width:10px;cursor:col-resize;z-index:9;touch-action:none}
.peek-grip::before{content:"";position:absolute;top:0;bottom:0;left:0;width:2px;background:transparent;transition:background .15s}
.peek-grip:hover::before,.peek-grip.drag::before{background:var(--signal)}
.peek-hd{height:52px;flex:none;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 16px;background:#fff}
.peek-hd .ti{font-size:15px;font-weight:800;color:var(--steel);display:flex;align-items:center;gap:8px}
.peek-hd .ti svg{width:19px;height:19px;color:var(--signal)}
.peek-hd .sp{margin-left:auto;display:flex;align-items:center;gap:2px}
.peek-hd .ico{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--soft)}
.peek-hd .ico:hover{background:var(--mist);color:var(--steel)}
.peek-hd .ico svg{width:19px;height:19px}
.peek-bd{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;padding:18px 20px 20px}
.peek-ft{flex:none;border-top:1px solid var(--line);background:#fff;padding:12px 16px;display:flex;justify-content:flex-end;gap:8px}
@media(max-width:640px){ .peek{width:100vw} .peek-grip{display:none} }

/* 상세 공통 요소 */
.dt-info{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
.dt-info .dt-top{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);background:#fafcff}
.dt-info .dt-top .no{font-weight:800;color:var(--ink)}
.dt-info .dt-top .cv{margin-left:auto;color:var(--soft)}
.itable{width:100%;border-collapse:collapse;font-size:12.5px}
.itable th{background:var(--grid-head);color:var(--steel);font-weight:700;padding:8px 10px;border:1px solid var(--grid-line);white-space:nowrap}
.itable td{padding:8px 10px;border:1px solid var(--grid-line);text-align:center;color:var(--ink)}
.form-row{display:flex;align-items:center;gap:10px;padding:9px 14px;flex-wrap:wrap}
.form-row .lb{width:96px;flex:none;font-size:12.5px;font-weight:700;color:var(--muted)}
.form-row .lb.req::after{content:" *";color:var(--danger)}
.pill-in{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;background:#fff;min-width:130px}
.grow{flex:1;min-width:140px}
.status-line{display:flex;justify-content:flex-end;padding:8px 14px 12px}
.tabs2{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:6px 0 0}
.tab2{padding:10px 16px;font-size:13px;font-weight:700;color:var(--soft);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab2.active{color:var(--signal);border-bottom-color:var(--signal)}
.dtable-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-top:14px}
.dtable{width:100%;border-collapse:collapse;font-size:12px;min-width:760px}
.dtable th{background:var(--grid-head);color:var(--steel);font-weight:700;padding:9px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--grid-line);white-space:nowrap;text-align:center}
.dtable th:last-child{border-right:0}
.dtable td{padding:8px 10px;border-bottom:1px solid var(--grid-line);border-right:1px solid var(--grid-line);text-align:center;color:var(--ink);vertical-align:middle}
.dtable td:last-child{border-right:0}
.dtable td.l{text-align:left}
.dtable .lk{color:var(--signal);font-weight:700;text-decoration:underline;cursor:pointer}
.dtable .lk.zero{color:var(--danger);text-decoration:line-through}
.dtable thead th{position:sticky;top:0;z-index:2}
.dtable tbody tr.zeb{background:#fafcff}
.dtable tbody tr.mainrow:hover{background:var(--grid-hover)}
.dtable .dim{color:var(--soft)}
.dtable td .mtxt{color:var(--muted);font-size:11px;display:block;margin-top:1px}
/* 카테고리 태그 */
.ctag{display:inline-block;font-size:11px;font-weight:800;border-radius:6px;padding:3px 9px;white-space:nowrap;letter-spacing:.2px}
.ctag.c0{background:#EAF1FB;color:#1B5FE0}
.ctag.c1{background:#E6F7F0;color:#0B8457}
.ctag.c2{background:#F1ECFB;color:#7C48C9}
.ctag.c3{background:#FEF3DD;color:#B7791F}
.ctag.c4{background:#FDEBEF;color:#D0364F}
.ctag.c5{background:#E9EEFB;color:#3B4EA0}
.ctag.c6{background:#EAF6F8;color:#0E7C93}
/* 확인요청 셀렉트 상태색 */
.ci-sel.s-propose{color:#7C48C9;border-color:#d9c9f2;background:#faf7fe}
.ci-sel.s-exclude{color:var(--danger);border-color:#f3c6cf;background:#fdf5f6}
.ci-sel.s-na{color:var(--soft)}
/* 제안/제외 서브행 */
.ci-sub2 td{background:#fdf5f6;border-top:1px dashed #f0bcc6!important;padding-top:9px;padding-bottom:9px}
.ci-sub2 .sub-badge{display:inline-block;font-size:10.5px;font-weight:800;border-radius:5px;padding:2px 7px;color:#fff;margin-right:6px}
.ci-sub2.propose .sub-badge{background:#7C48C9}
.ci-sub2.exclude .sub-badge{background:var(--danger)}
.ci-sub2 .rmsg{color:var(--danger);font-weight:700}
.ci-sub2 .chg{color:var(--danger);font-weight:800}
.req-note{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:14px;font-size:12.5px;color:var(--steel);background:#fafcff}
.req-note b{color:var(--signal)}
.blue-block{background:linear-gradient(135deg,#EAF2FF,#F3F8FF);border:1px solid #cfe0fb;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.blue-block .bb-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.blue-block .bb-no{font-size:15px;font-weight:800;color:var(--steel)}
.blue-block .bb-dt{font-size:12px;color:var(--muted)}
.blue-block .bb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 18px;margin-top:12px;font-size:12.5px}
.blue-block .bb-grid .f b{color:var(--ink)}
.blue-block .bb-grid .f span{color:var(--muted)}
/* 정돈된 key-value 요건 그리드 (라벨 위 / 값 아래) */
.reqgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px 24px;margin-top:10px}
.reqgrid.row{display:flex;flex-wrap:wrap;gap:8px 30px;align-items:center}
.kv{display:flex;flex-direction:column;gap:3px;min-width:0}
.kv .k{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1px}
.kv .v{font-size:13px;font-weight:700;color:var(--ink);line-height:1.45;word-break:keep-all}
.kv.full{grid-column:1/-1}
@media(max-width:760px){.reqgrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
/* 대시보드 */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.kpi{border:1px solid var(--line);border-radius:14px;background:#fff;padding:15px 16px 15px 20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi.blue .bar{background:var(--signal)}.kpi.green .bar{background:var(--ok)}.kpi.amber .bar{background:var(--warn)}.kpi.red .bar{background:var(--danger)}
.kpi .kk{font-size:12px;color:var(--muted);font-weight:700}
.kpi .kn{font-size:30px;font-weight:900;color:var(--ink);margin-top:7px;letter-spacing:-1px;line-height:1}
.kpi .kn em{font-size:14px;font-weight:700;color:var(--soft);font-style:normal;margin-left:3px}
.kpi .ks{font-size:11px;color:var(--soft);margin-top:5px}
.dash-2col{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.dcard{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow-sm);overflow:hidden}
.dcard .dch{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
.dcard .dch b{font-size:14px;color:var(--steel)}
.dcard .dch a{font-size:12px;color:var(--signal);cursor:pointer;font-weight:600}
.dcard table{width:100%;border-collapse:collapse;font-size:12.5px}
.dcard th{background:var(--grid-head);color:var(--steel);font-weight:700;padding:9px 12px;text-align:left;border-bottom:1px solid var(--grid-line);white-space:nowrap}
.dcard td{padding:10px 12px;border-bottom:1px solid var(--grid-line);color:var(--ink)}
.dcard tbody tr{cursor:pointer}.dcard tbody tr:hover{background:var(--grid-hover)}
.dcard tbody tr:last-child td{border-bottom:0}
.dlist .di{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--grid-line);cursor:pointer}
.dlist .di:last-child{border-bottom:0}.dlist .di:hover{background:var(--grid-hover)}
.dlist .di .no{font-weight:800;color:var(--ink);font-size:12.5px}
.dlist .di .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.dlist .di .rt{margin-left:auto;text-align:right;white-space:nowrap}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.dash-2col{grid-template-columns:1fr}}
.cond-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-top:12px;font-size:12.5px;color:var(--steel);line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.cond-box .lb{font-weight:800;color:var(--muted);white-space:nowrap}
.cond-box .edit{margin-left:auto;flex:none;font-size:11.5px;font-weight:700;color:var(--signal);border:1px solid #bcd2f2;border-radius:7px;padding:3px 9px;background:var(--mist)}
.sum-strip{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:12px 0}
.sum-strip .c{padding:11px 12px;border-right:1px solid var(--grid-line);text-align:center}
.sum-strip .c:last-child{border-right:0}
.sum-strip .c .k{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:4px}
.sum-strip .c .v{font-size:15px;font-weight:800;color:var(--ink)}
.sum-strip .c .v.blue{color:var(--signal)}

/* ===== 모달 ===== */
.modal-scrim{position:fixed;inset:0;background:rgba(10,26,47,.5);backdrop-filter:blur(2px);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-scrim.show{opacity:1;pointer-events:auto}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.98);z-index:201;background:#fff;border-radius:16px;
  box-shadow:0 40px 90px -30px rgba(11,30,60,.6);display:none;flex-direction:column;max-height:88vh;width:min(720px,94vw);opacity:0;transition:opacity .2s,transform .2s}
.modal.show{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1)}
.modal.wide{width:min(1180px,96vw)}
.modal.xwide{width:min(1360px,97vw)}
.modal-hd{height:52px;flex:none;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;font-size:15px;font-weight:800;color:var(--steel)}
.modal-hd .x{margin-left:auto;width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--soft);font-size:20px}
.modal-hd .x:hover{background:var(--mist);color:var(--steel)}
.modal-bd{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;padding:16px 18px}
.modal-ft{flex:none;border-top:1px solid var(--line);padding:12px 18px;display:flex;justify-content:center;gap:8px}

/* 매칭업체 모달 */
.mm-top{display:flex;gap:8px;font-size:12.5px;background:var(--grid-head);border:1px solid var(--grid-line);border-radius:8px;padding:9px 12px;margin-bottom:12px}
.mm-top b{color:var(--steel)}
.mm-wrap{display:grid;grid-template-columns:1fr 1.2fr;gap:16px}
.mm-col h4{font-size:13px;font-weight:800;color:var(--steel);margin:0 0 10px;display:flex;align-items:center;gap:8px}
.mm-add{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--signal);border:1px solid #bcd2f2;border-radius:7px;padding:3px 9px;background:var(--mist)}
.mm-picked{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.mm-picked .r{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--grid-line);font-size:12.5px}
.mm-picked .r:last-child{border-bottom:0}
.mm-picked .r .id{color:var(--muted);font-weight:700;width:42px}
.mm-picked .r .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.mm-picked .r .x{margin-left:auto;color:var(--soft);cursor:pointer}
.mm-search{display:flex;gap:6px;margin-bottom:8px}
.mm-search input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:12.5px}
.mm-list{border:1px solid var(--line);border-radius:10px;max-height:320px;overflow-y:auto}
.mm-list .r{display:grid;grid-template-columns:26px 52px 1fr 1.3fr;align-items:center;gap:6px;padding:9px 12px;border-bottom:1px solid var(--grid-line);font-size:12.5px;cursor:pointer}
.mm-list .r:last-child{border-bottom:0}
.mm-list .r:hover{background:var(--grid-hover)}
.mm-list .cbx{width:18px;height:18px;border:2px solid var(--line);border-radius:5px;display:grid;place-items:center;color:#fff}
.mm-list .r.on .cbx{background:var(--signal);border-color:var(--signal)}
.mm-list .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:5px}
.mm-list .cat{color:var(--muted)}

/* 구매정보확인 모달 */
.ci-head{background:linear-gradient(135deg,#EAF2FF,#F3F8FF);border:1px solid #cfe0fb;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.ci-head .r1{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ci-head .no{font-size:15px;font-weight:800;color:var(--steel)}
.ci-head .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 18px;margin-top:10px;font-size:12.5px;color:var(--muted)}
.ci-head .grid b{color:var(--ink)}
.ci-sel{border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:12px;background:#fff;color:var(--signal);font-weight:700}
.ci-sub td{background:#fff6f6;color:var(--danger);font-weight:700;font-size:11.5px;border-top:1px dashed #f3b6c0!important}
.ci-legend{position:absolute;border:1px solid #b9a3e8;border-radius:8px;padding:8px 10px;font-size:11px;color:#6b48c9;background:#fff}

/* ===== 재정리된 견적 비교 (slide 21) ===== */
.cmp-intro{font-size:13px;color:var(--muted);margin:-2px 0 14px}
.vcards{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 10px;margin-bottom:12px}
.vcard{flex:0 0 246px}
.vcard.man{border-color:#cdbcf0;background:linear-gradient(#f8f5fe,#fff)}
.vcard .ribbon{position:absolute;top:-1px;right:-1px;background:#0B8457;color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:0 13px 0 11px}
.vcard .vrm{position:absolute;top:9px;right:10px;color:var(--soft);cursor:pointer;font-size:15px;line-height:1}
.vcard .vrm:hover{color:var(--danger)}
.vcard .vname-in{font-size:13px;font-weight:800;color:var(--steel);border:1px solid #d9c9f2;border-radius:7px;padding:5px 8px;width:100%;background:#fff}
.vcard.add{flex:0 0 154px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;border:1.5px dashed var(--line);background:#fbfdff;color:var(--signal);cursor:pointer;text-align:center}
.vcard.add:hover{border-color:var(--signal);background:var(--mist)}
.vcard.add .plus{width:42px;height:42px;border-radius:50%;background:var(--mist);display:grid;place-items:center;font-size:24px;font-weight:800;line-height:1}
.vcard.add b{font-size:12.5px;color:var(--steel)}
.vcard.add span{font-size:11px;color:var(--muted)}
.cmp-tbl td.man{background:#faf7fe}
.cmp-tbl th.manh{background:#f3ecfb}
.cmp-tbl .mq{width:88px;text-align:right;border:1px solid #d9c9f2;border-radius:6px;padding:6px 8px;font:inherit;font-size:12px;background:#fff}
.cmp-tbl .mq:focus{outline:none;border-color:#7C48C9}
.vcard{border:1.5px solid var(--line);border-radius:14px;padding:16px;background:#fff;position:relative}
.vcard.v1{border-color:#bfe6cd;background:linear-gradient(#f4fbf6,#fff)}
.vcard.v2{border-color:#f4e3ad;background:linear-gradient(#fefaef,#fff)}
.vcard.v3{border-color:#f2c6cd;background:linear-gradient(#fdf4f5,#fff)}
.vcard .vh{display:flex;align-items:center;justify-content:space-between;gap:8px}
.vcard .vname{font-size:13.5px;font-weight:800;color:var(--steel)}
.vcard .vrate{font-size:11.5px;font-weight:700;color:var(--muted)}
.vcard .vtot{font-size:24px;font-weight:900;color:var(--ink);margin:12px 0 4px;letter-spacing:-.5px}
.vcard .vmeta{font-size:11.5px;color:var(--muted);display:flex;gap:16px;margin-bottom:12px}
.vcard .vmeta b{color:var(--steel)}
.vcard .vsel{width:100%;padding:9px;border-radius:9px;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--steel)}
.vcard.v1 .vsel{border-color:#7cc99a;color:#0e7a49}
.vcard .vsel:hover{filter:brightness(.97)}
.vcard .vsel.pick{background:var(--signal);color:#fff;border-color:var(--signal)}
.cmp-tbl-wrap{border:1px solid var(--line);border-radius:12px;overflow:auto}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:860px}
.cmp-tbl th{background:var(--grid-head);color:var(--steel);font-weight:700;padding:10px;border-bottom:1px solid var(--line);border-right:1px solid var(--grid-line);white-space:nowrap;text-align:left}
.cmp-tbl th.vh1{background:#eef8f1}.cmp-tbl th.vh2{background:#fdf7ea}.cmp-tbl th.vh3{background:#fbeef0}
.cmp-tbl td{padding:9px 10px;border-bottom:1px solid var(--grid-line);border-right:1px solid var(--grid-line);vertical-align:top}
.cmp-tbl td:last-child,.cmp-tbl th:last-child{border-right:0}
.cmp-tbl .vc{text-align:right;font-variant-numeric:tabular-nums}
.cmp-tbl .vc .tp{font-weight:800;color:var(--ink)}
.cmp-tbl .vc .up{font-size:11px;color:var(--muted)}
.cmp-tbl .vc.low{background:#eef8f1}
.cmp-tbl .vc.low .tp{color:#0e7a49}
.cmp-tbl .vc.nobid{color:var(--soft);text-align:center;background:#f7f9fc}
.cmp-tbl tr.flag{background:#fff9ee}
.cmp-tbl .warnflag{display:inline-flex;align-items:center;gap:5px;color:var(--warn);font-weight:800;font-size:11px}
.cmp-tbl .warnflag svg{width:13px;height:13px}
.cmp-tbl .icls b{display:block;color:var(--ink)}
.cmp-tbl .spec{color:var(--muted);font-size:11.5px}
.warn-ic{width:15px;height:15px;color:var(--warn);vertical-align:-2px}

/* placeholder */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 20px;color:var(--muted);text-align:center}
.ph .ic{width:64px;height:64px;border-radius:16px;background:var(--mist);color:var(--signal);display:grid;place-items:center}
.ph b{font-size:16px;color:var(--steel)}
.toast{position:fixed;left:50%;bottom:34px;transform:translate(-50%,16px);background:#12233c;color:#fff;font-size:13px;font-weight:600;
  padding:12px 20px;border-radius:11px;z-index:300;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>

function renderSidebar(){
  var nav=$('nav');nav.innerHTML='';
  MENU.forEach(function(m){
    var sec=el('<div class="nav-sec" data-id="'+m.id+'"></div>');
    var hasKids=m.children&&m.children.length;
    var h=el('<button class="nav-h"><span class="ic"><svg viewBox="0 0 24 24" fill="none">'+IC[m.icon]+'</svg></span><span>'+m.label+'</span>'+(hasKids?'<svg class="cv" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+'</button>');
    if(hasKids){
      h.onclick=function(){sec.classList.toggle('open');};
      sec.appendChild(h);
      var sub=el('<div class="nav-sub"></div>');
      m.children.forEach(function(c){
        var a=el('<a class="nav-i" data-view="'+c.view+'" data-vid="'+c.id+'">'+c.label+'</a>');
        a.onclick=function(){go(c.view,c.id,[m.label,c.label]);};
        sub.appendChild(a);
      });
      sec.appendChild(sub);
    } else {
      h.onclick=function(){go(m.view,m.id,[m.label]);};
      sec.appendChild(h);
    }
    nav.appendChild(sec);
  });
}
function go(view,vid,crumb){
  closePeek();closeModal();
  crumb=Array.isArray(crumb)?crumb:[crumb];
  [].forEach.call(document.querySelectorAll('.nav-i'),function(a){a.classList.toggle('active',a.getAttribute('data-vid')===vid);});
  [].forEach.call(document.querySelectorAll('.nav-h'),function(h){h.classList.remove('active');});
  // open parent section
  MENU.forEach(function(m){
    if(m.children&&m.children.some(function(c){return c.id===vid;})){
      var sec=document.querySelector('.nav-sec[data-id="'+m.id+'"]');
      if(sec){sec.classList.add('open');sec.querySelector('.nav-h').classList.add('active');}
    } else if(m.id===vid){
      var s2=document.querySelector('.nav-sec[data-id="'+m.id+'"]');if(s2)s2.querySelector('.nav-h').classList.add('active');
    }
  });
  $('crumb').innerHTML='<svg class="home" viewBox="0 0 24 24" fill="none"><path d="M4 11l8-7 8 7M6 10v9h12v-9" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>'+
    crumb.map(function(c,i){return (i?'<svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.7"/></svg>':'')+(i===crumb.length-1?'<b>'+c+'</b>':c);}).join('');
  [].forEach.call(document.querySelectorAll('.view'),function(v){v.classList.remove('show');});
  var vEl=$('v-'+view);vEl.classList.add('show');
  var meta=VIEW_META[view];
  if(meta&&meta.fn) meta.fn(vEl); else renderGeneric(vEl,crumb[crumb.length-1]);
}

  return '<p class="cmp-intro">공급사별 등록 견적 <b>'+C.vs.length+'개</b>를 나란히 비교합니다. 최저가 셀은 초록색, 규격 상이/미제출은 별도 표시되며, 우측 <b>＋</b>에서 운영자가 견적을 직접 생성할 수 있습니다.</p>'+
    '<div class="vcards">'+cards+'</div>'+
    '<div class="cmp-tbl-wrap"><table class="cmp-tbl"><thead><tr><th>NO</th><th>품목분류</th><th>재질 / 규격 (요약)</th><th>수량</th>'+heads+'<th>비고</th></tr></thead><tbody>'+rows+totRow+'</tbody></table></div>';
}
function cmpSelect(k){cmpPick=k;renderCompare();var v=allVendors().find(function(x){return x.k===k;});toast((v?v.name:'')+' 견적을 선택했습니다');}
function addManualVendor(){manCnt++;var k='m'+manCnt;manualVendors.push({k:k,name:'수동 견적 '+manCnt,manual:true});CMP.forEach(function(r){r.q[k]=null;});cmpPick=k;cmpTab='supplier';renderCompare();toast('수동 견적 열을 추가했습니다. 각 품목 단가를 입력하세요.');}
function removeVendor(k){manualVendors=manualVendors.filter(function(v){return v.k!==k;});CMP.forEach(function(r){delete r.q[k];});if(cmpPick===k)cmpPick='v1';renderCompare();}
function renameVendor(k,name){var v=manualVendors.find(function(x){return x.k===k;});if(v)v.name=name||('수동 견적');}
function cmpEdit(inp){var k=inp.getAttribute('data-k'),rno=parseInt(inp.getAttribute('data-r'));var val=inp.value===''?null:(parseFloat(inp.value)||0);var r=CMP.find(function(x){return x.no===rno;});if(r)r.q[k]=val;renderCompare();}

/* --- 탭 B : 자동 생성 추천 견적 비교 (추천견적 전략 매트릭스) --- */
function cmpRecAll(){return RECS.concat(cmpRecManual);}
function cmpRecUp(it,r){ if(r.manual){var u=r.q&&r.q[it.no]; return (u==null||u==='')?null:u;} var q=it.recs[r.k]; return q?q.up:null; }
function cmpRecMg(it,r){ if(r.manual)return 0; var q=it.recs[r.k]; return q?q.mg:0; }
function cmpRecSum(it,r){ var up=cmpRecUp(it,r); if(up==null)return null; return Math.round((up+cmpRecMg(it,r))*it.qty); }
function cmpAutoCompute(){
  var recs=cmpRecAll(), totals={}, low={}, quoted={};
  recs.forEach(function(r){totals[r.k]=0;low[r.k]=0;quoted[r.k]=0;});
  AUTO.forEach(function(it){
    var min=Infinity;
    recs.forEach(function(r){var s=cmpRecSum(it,r); if(s!=null){totals[r.k]+=s;quoted[r.k]++; if(s<min)min=s;}});
    it._rmin=min;
    recs.forEach(function(r){var s=cmpRecSum(it,r); if(s!=null&&s===min)low[r.k]++;});
  });
  var cheapest=null,cmin=Infinity;
  recs.forEach(function(r){if(quoted[r.k]===AUTO.length&&totals[r.k]<cmin){cmin=totals[r.k];cheapest=r.k;}});
  return {recs:recs,totals:totals,low:low,quoted:quoted,n:AUTO.length,cheapest:cheapest};
}
function cmpAutoHTML(){
  var C=cmpAutoCompute();
  var cards=C.recs.map(function(r){
    var picked=cmpRecPick===r.k, matched=Math.round(C.quoted[r.k]/C.n*100), miss=C.n-C.quoted[r.k];
    var head=r.manual
      ? '<span class="vrm" onclick="removeCmpRec(\''+r.k+'\')">✕</span><input class="vname-in" value="'+r.name+'" onchange="renameCmpRec(\''+r.k+'\',this.value)">'
      : '<div class="vh"><span class="vname">'+r.name+'</span></div><div class="vrate">'+(r.tag||'')+(r.rate?' · 매칭률 '+r.rate+'%':'')+'</div>';
    var ribbon=(C.cheapest===r.k)?'<span class="ribbon">전체 최저</span>':'';
    return '<div class="vcard '+(r.manual?'man':(r.tone||'v1'))+'" style="position:relative">'+ribbon+head+
      '<div class="vtot">₩ '+nf(C.totals[r.k])+'</div>'+
      '<div class="vmeta"><span>'+(r.split||'수동 구성')+'</span><span>최저가 <b>'+C.low[r.k]+'건</b></span>'+(miss>0?'<span>미제출 <b class="red">'+miss+'</b></span>':'')+'</div>'+
      '<button class="vsel'+(picked?' pick':'')+'" onclick="cmpRecSelect(\''+r.k+'\')">'+(picked?'✓ 선택됨':'견적 선택')+'</button></div>';
  }).join('');
  cards+='<div class="vcard add" onclick="addCmpRec()"><span class="plus">+</span><b>견적 수동 생성</b><span>운영자가 직접<br>구성·입력합니다</span></div>';
  var heads=C.recs.map(function(r){return '<th class="'+(r.manual?'manh':'')+'">'+r.name+'<br><span class="muted" style="font-weight:600">'+(r.manual?'수동 입력':(r.split||''))+'</span></th>';}).join('');
  var rows=AUTO.map(function(it){
    var cells=C.recs.map(function(r){
      if(r.manual){ var mu=cmpRecUp(it,r); return '<td class="vc man"><input class="mq" data-rk="'+r.k+'" data-i="'+it.no+'" value="'+(mu==null?'':mu)+'" onchange="cmpRecEdit(this)" placeholder="단가"><div class="up">'+(mu?'₩ '+nf(Math.round(mu*it.qty)):'')+'</div></td>'; }
      var s=cmpRecSum(it,r); if(s==null)return '<td class="vc nobid">미제출</td>';
      var isLow=s===it._rmin;
      return '<td class="vc'+(isLow?' low':'')+'"><span class="tp">₩ '+nf(s)+'</span><br><span class="up">단가 '+nf(cmpRecUp(it,r))+'</span></td>';
    }).join('');
    return '<tr><td>'+it.no+'</td><td class="icls"><b>'+it.cls+'</b></td><td class="spec">'+it.mat+'</td><td>'+it.qty+' '+it.unit+'</td>'+cells+'</tr>';
  }).join('');
  var totRow='<tr style="background:var(--grid-head);font-weight:800"><td colspan="4" class="spec" style="text-align:right;color:var(--steel)">합계 (VAT 별도)</td>'+
    C.recs.map(function(r){return '<td class="vc'+(C.cheapest===r.k?' low':'')+(r.manual?' man':'')+'"><span class="tp">₩ '+nf(C.totals[r.k])+'</span></td>';}).join('')+'</tr>';
  return '<p class="cmp-intro">자동 생성된 추천 견적(전략) <b>'+RECS.length+'개</b>를 비교합니다. 최저가 셀은 초록색이며, 우측 <b>＋</b>에서 운영자가 견적을 직접 구성할 수 있습니다.</p>'+
    '<div class="vcards">'+cards+'</div>'+
    '<div class="cmp-tbl-wrap"><table class="cmp-tbl"><thead><tr><th>NO</th><th>품목분류</th><th>재질 / 규격 (요약)</th><th>수량</th>'+heads+'</tr></thead><tbody>'+rows+totRow+'</tbody></table></div>';
}
function cmpRecSelect(k){cmpRecPick=k;renderCompare();var r=cmpRecAll().find(function(x){return x.k===k;});toast((r?r.name:'')+' 견적을 선택했습니다');}
function addCmpRec(){cmpRecMan++;var k='cr'+cmpRecMan;cmpRecManual.push({k:k,name:'수동 견적 '+cmpRecMan,manual:true,q:{},split:'운영자 구성'});cmpRecPick=k;cmpTab='auto';renderCompare();toast('수동 견적 열을 추가했습니다. 각 품목 단가를 입력하세요.');}
function removeCmpRec(k){cmpRecManual=cmpRecManual.filter(function(r){return r.k!==k;});if(cmpRecPick===k)cmpRecPick='r2';renderCompare();}
function renameCmpRec(k,name){var r=cmpRecManual.find(function(x){return x.k===k;});if(r)r.name=name||'수동 견적';}
function cmpRecEdit(inp){var k=inp.getAttribute('data-rk'),no=parseInt(inp.getAttribute('data-i'));var r=cmpRecManual.find(function(x){return x.k===k;});if(r){var v=inp.value===''?null:(parseFloat(inp.value)||0);r.q[no]=v;}renderCompare();}

/* ============================================================
   피크 / 모달 공통 동작
   ============================================================ */
function markSel(tr){ if(!tr)return; var tb=tr.closest('tbody'); if(tb)[].forEach.call(tb.querySelectorAll('tr'),function(x){x.classList.remove('sel');}); tr.classList.add('sel'); }
function openPeek(){ var p=$('peek'); requestAnimationFrame(function(){p.classList.add('show');}); }
function closePeek(){ var p=$('peek'); p.classList.remove('show','full'); p.style.width=''; }
function peekToggleFull(btn){ var p=$('peek'); var full=p.classList.toggle('full'); if(full)p.style.width=''; btn.title=full?'좁게 보기':'넓게 보기'; }
function openModal(){ $('modalScrim').classList.add('show'); var m=$('modal'); requestAnimationFrame(function(){m.classList.add('show');}); }
function closeModal(){ $('modalScrim').classList.remove('show'); $('modal').classList.remove('show'); }

/* 피크 리사이즈 그립 */
(function(){
  var drag=null;
  function move(e){ if(!drag)return; var x=(e.touches?e.touches[0].clientX:e.clientX); var w=Math.min(window.innerWidth-70,Math.max(420,window.innerWidth-x)); $('peek').style.width=w+'px'; e.preventDefault(); }
  function up(){ if(!drag)return; drag.classList.remove('drag'); document.body.style.userSelect=''; drag=null; document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); }
  function start(e){ var g=e.target.closest('.peek-grip'); if(!g)return; $('peek').classList.remove('full'); drag=g; g.classList.add('drag'); document.body.style.userSelect='none'; document.addEventListener('mousemove',move); document.addEventListener('mouseup',up); document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up); e.preventDefault(); }
  document.addEventListener('mousedown',start);
  document.addEventListener('touchstart',start,{passive:false});
  /* 외부(목록) 클릭 시 피크 닫기 — 다른 행 클릭은 내용 교체 */
  document.addEventListener('mousedown',function(e){
    var p=$('peek'); if(!p.classList.contains('show'))return;
    if(window.innerWidth<=640)return;
    if(p.contains(e.target))return;
    if($('modal').classList.contains('show')||$('modalScrim').classList.contains('show'))return;
    if(e.target.closest('.peek-grip'))return;
    if(e.target.closest('tr[onclick]'))return;    // 다른 행 → 내용 교체
    closePeek();
  });
})();
document.addEventListener('keydown',function(e){
  if(e.key!=='Escape')return;
  if($('modal').classList.contains('show')){ closeModal(); return; }
  if($('peek').classList.contains('show')){ closePeek(); return; }
});

/* ---------- 부팅 ---------- */
renderSidebar();
go('dash','dash',['대시보드']);

</script>
